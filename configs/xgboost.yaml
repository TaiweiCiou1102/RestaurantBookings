model_params:
  n_estimators: 200
  max_depth: 6
  learning_rate: 0.1
  #early_stopping_rounds: 30
  random_state: 42
  n_jobs: -1
  eval_metric: "mlogloss" # multi-class log loss for classification, rmse for regression
  enable_categorical: true # use XGBoost native categorical splits (cols converted to category dtype in preprocessing)

granularity:
  hour:
    target: reservation_hour
    leakage: [reservation_seconds, reservation_half_hour]
  half_hour:
    target: reservation_half_hour
    leakage: [reservation_hour, reservation_seconds]

subsets:
  "午餐 Lunch (11-14h)": { hour_min: 11, hour_max: 14 }
  "下午茶 Afternoon (15-17h)": { hour_min: 15, hour_max: 17 }
  "晚餐 Dinner (18-23h)": { hour_min: 18, hour_max: 23 }

evaluation:
  test_size: 0.2
  split_strategy: random # random | temporal (random is default for tabular data, temporal is for time series)
  cv_folds: 5 # 0 = holdout only
  log_confusion_matrix: true
  log_feature_importance: true
  tolerance_slots: 1 # ±1 slot tolerance accuracy


