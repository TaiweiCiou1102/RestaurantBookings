# Conda environment for deployment/score.py (three-subset XGBoost endpoint)
#
# Pins match the training run (xgboost 3.2.0, scikit-learn 1.8.0, python 3.12.2)
# so the pickled encoders / saved boosters load identically.
#
# azureml-inference-server-http is REQUIRED for Azure ML online endpoints — it is
# the HTTP server that hosts init()/run(). Without it the deployment won't start.

name: restaurant-score-env
channels:
  - conda-forge
dependencies:
  - python=3.12.2
  - pip
  - pip:
    - joblib>=1.3
    - numpy==2.3.5
    - pandas==2.3.3
    - scikit-learn==1.8.0
    - xgboost==3.2.0
    - azureml-inference-server-http
