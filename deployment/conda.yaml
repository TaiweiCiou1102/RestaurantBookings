# Conda environment for deployment/score.py
# Source reference: mlruns/2/models/m-858ece605d8449a7a921a8385df78186/artifacts/conda.yaml
#
# Trimmed to only what score.py actually imports:
#   joblib, numpy, pandas, scikit-learn (LabelEncoder, OrdinalEncoder), xgboost
#
# Removed from MLflow-generated env (not used by score.py):
#   mlflow, psutil, pyarrow, scipy

name: restaurant-score-env
channels:
  - conda-forge
dependencies:
  - python=3.12.2
  - pip
  - pip:
    - joblib>=1.3
    - numpy==2.3.5
    - pandas==2.3.3
    - scikit-learn==1.8.0
    - xgboost==3.2.0
